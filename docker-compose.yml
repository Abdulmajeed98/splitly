services:
  postgres:
    image: postgres:18-alpine
    container_name: splitly-db
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - splitly_pgdata:/var/lib/postgresql

volumes:
  splitly_pgdata:
